<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - R-Next Technologies</title>
<style>
  body{font-family:'Segoe UI',sans-serif; background:#0b1120; color:white; margin:0; padding:0;}
  h2{text-align:center; margin-bottom:20px;}
  .container{max-width:1000px; margin:40px auto; padding:20px; background:rgba(15,23,42,0.9); border-radius:15px;}
  input{padding:10px; margin:10px 0; width:calc(100% - 24px); border:none; border-radius:8px;}
  button{padding:10px 20px; margin:5px; border:none; border-radius:30px; cursor:pointer; font-weight:bold; background:linear-gradient(135deg,#0ea5e9,#6366f1); color:white; transition:0.3s;}
  button:hover{transform:scale(1.05);}
  table{width:100%; border-collapse:collapse; margin-top:20px;}
  th, td{padding:12px; text-align:left; border-bottom:1px solid #334155;}
  th{background:#111827;}
  tr:hover{background:rgba(255,255,255,0.05);}
  .login-box{max-width:400px; margin:100px auto; background:rgba(15,23,42,0.9); padding:30px; border-radius:15px; text-align:center;}
  .logout-btn{float:right; margin-bottom:10px;}
  #searchInput{width:50%; margin-bottom:10px;}
</style>
</head>
<body>

<div id="loginDiv" class="login-box">
  <h2>Admin Login</h2>
  <input type="text" id="username" placeholder="Username"><br>
  <input type="password" id="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
  <p id="loginError" style="color:#f87171;"></p>
</div>

<div id="dashboardDiv" class="container" style="display:none;">
  <button class="logout-btn" onclick="logout()">Logout</button>
  <h2>Admin Dashboard</h2>
  <input type="search" id="searchInput" placeholder="Search by name/email/message...">
  <table>
    <thead>
      <tr>
        <th>#</th><th>Name</th><th>Email</th><th>Message</th><th>Date</th><th>Action</th>
      </tr>
    </thead>
    <tbody id="messagesTable"></tbody>
  </table>
</div>

<script>
  const USER="robin";
  const PASS="";

  // Check session
  if(sessionStorage.getItem("adminLogged") === "true"){
    showDashboard();
  }

  function login(){
    const u=document.getElementById("username").value;
    const p=document.getElementById("password").value;
    const err=document.getElementById("loginError");
    if(u===USER && p===PASS){
      sessionStorage.setItem("adminLogged","true");
      showDashboard();
    }else{ err.textContent="Invalid username or password!"; }
  }

  function logout(){
    sessionStorage.removeItem("adminLogged");
    document.getElementById("dashboardDiv").style.display="none";
    document.getElementById("loginDiv").style.display="block";
  }

  function showDashboard(){
    document.getElementById("loginDiv").style.display="none";
    document.getElementById("dashboardDiv").style.display="block";
    loadMessages();
    // Auto refresh every 2 seconds
    setInterval(loadMessages,2000);
  }

  function loadMessages(){
    const tbody=document.getElementById("messagesTable");
    tbody.innerHTML="";
    let messages=JSON.parse(localStorage.getItem("messages"))||[];
    messages.forEach((msg,i)=>{
      const tr=document.createElement("tr");
      tr.innerHTML=`<td>${i+1}</td>
      <td>${msg.name}</td>
      <td>${msg.email}</td>
      <td>${msg.message}</td>
      <td>${msg.date}</td>
      <td><button onclick="deleteMessage(${i})">Delete</button></td>`;
      tbody.appendChild(tr);
    });
  }

  function deleteMessage(index){
    let messages=JSON.parse(localStorage.getItem("messages"))||[];
    messages.splice(index,1);
    localStorage.setItem("messages",JSON.stringify(messages));
    loadMessages();
  }

  // Search
  document.getElementById("searchInput").addEventListener("input", function(){
    const filter=this.value.toLowerCase();
    const rows=document.querySelectorAll("#messagesTable tr");
    rows.forEach(row=>{
      row.style.display=Array.from(row.cells).some(td=>td.textContent.toLowerCase().includes(filter))?"":"none";
    });
  });
</script>

</body>
</html>
